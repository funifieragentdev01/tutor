<div class="login-page-studini">
    <div class="login-container-studini">
        <!-- Video inside card -->
        <div class="login-video-wrapper">
            <video class="login-video-inline" autoplay muted loop playsinline>
                <source src="img/landing/login-video.mp4" type="video/mp4">
            </video>
        </div>

        <h1 class="login-logo-studini">Studini</h1>
        
        <!-- User Type Selection -->
        <div ng-if="!userType" class="login-type-selection">
            <h2 class="login-subtitle-studini">Como você quer entrar?</h2>
            
            <button class="login-type-btn" ng-click="selectUserType('parent')">
                <span class="login-type-btn-icon"><i class="fa-solid fa-user-shield"></i></span>
                <div>
                    <span class="login-type-btn-label">Sou Pai/Mãe</span>
                    <span class="login-type-btn-desc">Acompanhar o aprendizado do meu filho</span>
                </div>
            </button>
            
            <button class="login-type-btn" ng-click="selectUserType('child')">
                <span class="login-type-btn-icon"><i class="fa-solid fa-gamepad"></i></span>
                <div>
                    <span class="login-type-btn-label">Sou Aluno(a)</span>
                    <span class="login-type-btn-desc">Vou jogar e aprender</span>
                </div>
            </button>
        </div>
        
        <!-- Login Form -->
        <div ng-if="userType" class="login-form-studini">
            <h2 class="login-subtitle-studini">
                {{userType === 'parent' ? 'Entrar como Pai/Mãe' : 'Entrar como Aluno(a)'}}
            </h2>
            
            <form ng-submit="login()">
                <div class="login-field">
                    <label>E-mail</label>
                    <input type="email" ng-model="$parent.email" 
                           placeholder="{{$parent.userType === 'parent' ? 'pai@email.com' : 'aluno@email.com'}}" 
                           required>
                </div>
                <div class="login-field">
                    <label>Senha</label>
                    <input type="password" ng-model="$parent.password" 
                           placeholder="{{$parent.userType === 'parent' ? 'Sua senha' : 'Senha definida pelos pais'}}" 
                           required>
                </div>
                
                <div class="auth-error" ng-show="error">{{error}}</div>
                
                <button type="submit" class="login-submit-studini" ng-disabled="loading">
                    {{loading ? 'Entrando...' : 'Entrar'}}
                </button>
            </form>
            
            <p class="login-link-studini">
                Não tem conta? <a href="" ng-click="goSignup()">Criar conta</a>
            </p>
            <p class="login-link-studini">
                <a href="" ng-click="userType = null">← Voltar</a> |
                <a href="" ng-click="goLanding()">Página inicial</a>
            </p>
        </div>
    </div>
</div>
