<div class="auth-page">
    <div class="auth-container">
        <h1 class="auth-logo">Tutor</h1>
        <h2 class="auth-title">Entrar</h2>
        
        <form ng-submit="login()" class="auth-form">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" ng-model="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" ng-model="password" placeholder="Sua senha" required>
            </div>
            
            <div class="auth-error" ng-show="error">{{error}}</div>
            
            <button type="submit" class="btn btn-primary btn-block" ng-disabled="loading">
                {{loading ? 'Entrando...' : 'Entrar'}}
            </button>
        </form>
        
        <p class="auth-link">
            Não tem conta? <a href="" ng-click="goSignup()">Criar conta</a>
        </p>
        <p class="auth-link">
            <a href="" ng-click="goLanding()">Voltar</a>
        </p>
    </div>
</div>
