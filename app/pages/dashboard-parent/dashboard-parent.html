<div class="app-page parent-page">
    <!-- Header -->
    <div class="app-header">
        <div class="header-left">
            <span class="header-greeting">Olá, {{parentName}}!</span>
        </div>
        <div class="header-right">
            <button class="btn-icon" ng-click="logout()">
                <span class="icon">↩</span>
            </button>
        </div>
    </div>

    <!-- Children List -->
    <div class="section-pad">
        <h2 class="section-heading">Seus Filhos</h2>
        
        <div class="children-list">
            <!-- Existing children -->
            <div class="child-card-wide" ng-repeat="child in children">
                <div class="child-card-main" ng-click="openChild(child)">
                    <div class="child-avatar-lg" ng-style="{'background-color': child.color || '#FF9600'}">
                        <img ng-if="child.image && child.image.small && child.image.small.url" ng-src="{{child.image.small.url}}" class="child-avatar-img">
                        <span ng-if="!(child.image && child.image.small && child.image.small.url)">{{child.name.charAt(0).toUpperCase()}}</span>
                    </div>
                    <div class="child-info">
                        <div class="child-name-lg">{{child.name}}</div>
                        <div class="child-stats-lg" ng-if="child.subjectCount !== undefined">
                            {{child.subjectCount}} disciplina{{child.subjectCount !== 1 ? 's' : ''}}
                        </div>
                    </div>
                    <span class="child-arrow">›</span>
                </div>
                <div class="child-actions-wide">
                    <button class="btn-child-action-wide" ng-click="captureChild(child, $event)">
                        <span class="action-icon"><i class="fa-solid fa-camera"></i></span><span class="action-label">Capturar</span>
                    </button>
                    <button class="btn-child-action-wide" ng-click="openExams(child, $event)">
                        <span class="action-icon"><i class="fa-solid fa-calendar"></i></span><span class="action-label">Provas</span>
                    </button>
                    <button class="btn-child-action-wide" ng-click="editChild(child, $event)">
                        <span class="action-icon"><i class="fa-solid fa-pen"></i></span><span class="action-label">Editar</span>
                    </button>
                    <button class="btn-child-action-wide btn-action-delete" ng-click="deleteChild(child, $event)">
                        <span class="action-icon"><i class="fa-solid fa-trash"></i></span><span class="action-label">Excluir</span>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Add child button -->
        <button class="btn btn-secondary btn-block btn-add-child" ng-click="openAddChild()" style="margin-top: 16px;">
            + Adicionar Filho
        </button>
    </div>

    <!-- Empty state -->
    <div class="empty-state" ng-if="children.length === 0 && !showAddChild && !loading">
        <div class="empty-icon">👨‍👧‍👦</div>
        <h3>Nenhum filho cadastrado</h3>
        <p>Cadastre seu primeiro filho para começar a criar trilhas de aprendizado personalizadas.</p>
        <button class="btn btn-primary" ng-click="openAddChild()">Cadastrar Filho</button>
    </div>

    <!-- Loading -->
    <div class="loading-state" ng-if="loading">
        <div class="spinner"></div>
        <p>Carregando...</p>
    </div>
</div>
