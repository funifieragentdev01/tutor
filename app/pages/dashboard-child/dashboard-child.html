<div class="app-page child-page">
    <!-- Header -->
    <div class="app-header">
        <div class="header-left">
            <div class="child-header-avatar" ng-style="{'background-color': avatarColor}">
                <img ng-if="avatarUrl" ng-src="{{avatarUrl}}" class="child-avatar-img">
                <span ng-if="!avatarUrl">{{childName.charAt(0).toUpperCase()}}</span>
            </div>
            <span class="header-greeting">Olá, {{childName}}!</span>
        </div>
        <div class="header-right">
            <button class="btn-icon" ng-click="logout()">
                <span class="icon">↩</span>
            </button>
        </div>
    </div>

    <!-- Subjects (Duolingo-style trail) -->
    <div class="section-pad">
        <h2 class="section-heading">Minhas Disciplinas</h2>
        
        <div class="child-trail" ng-if="subjects.length > 0">
            <div class="trail-node" ng-repeat="subj in subjects" 
                 ng-click="openSubject(subj)"
                 ng-class="{'trail-locked': subj.is_unlocked === false}"
                 ng-style="{'--node-color': getColor($index)}">
                <div class="trail-node-icon" ng-style="{'background-color': getColor($index)}">
                    <span>{{getIcon(subj)}}</span>
                </div>
                <div class="trail-node-info">
                    <div class="trail-node-title">{{subj.title}}</div>
                    <div class="trail-node-progress" ng-if="subj.total > 0">
                        <div class="progress-bar-mini">
                            <div class="progress-fill-mini" ng-style="{'width': (subj.percent || 0) + '%', 'background': getColor($index)}"></div>
                        </div>
                        <span class="trail-node-percent">{{(subj.percent || 0) | number:0}}%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div class="empty-state" ng-if="subjects.length === 0 && !loading">
            <div class="empty-icon">📚</div>
            <h3>Nenhuma disciplina ainda</h3>
            <p>Peça para seu pai ou mãe adicionar disciplinas para você!</p>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading-state" ng-if="loading">
        <div class="spinner"></div>
        <p>Carregando...</p>
    </div>
</div>
