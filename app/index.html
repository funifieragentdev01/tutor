<!DOCTYPE html>
<html lang="pt-BR" ng-app="tutorApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#131F24">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tutor — Seu professor particular com IA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="img/favicon.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css?v=0.21.2">
    
    <!-- AngularJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.2/angular.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular-route/1.8.2/angular-route.min.js"></script>
    
    <!-- Config -->
    <script src="config.js?v=0.21.2"></script>
</head>
<body ng-class="{'logged-in': isLoggedIn, 'has-bottom-nav': showBottomNav}">

    <!-- App View -->
    <div ng-view class="view-container"></div>
    
    <!-- Bottom Navigation -->
    <nav class="bottom-nav" ng-show="showBottomNav" ng-controller="BottomNavController">
        <!-- Parent Navigation -->
        <div ng-if="isParent" class="bottom-nav-items">
            <a href="#!/parent" class="nav-item" ng-class="{active: isActive('/parent')}">
                <span class="nav-icon"><i class="fa-solid fa-house"></i></span>
                <span class="nav-label">Home</span>
            </a>
            <a href="" class="nav-item" ng-click="goToCapture()">
                <span class="nav-icon"><i class="fa-solid fa-camera"></i></span>
                <span class="nav-label">Capturar</span>
            </a>
            <a href="" class="nav-item" ng-click="logout()">
                <span class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></span>
                <span class="nav-label">Sair</span>
            </a>
        </div>
        
        <!-- Child Navigation -->
        <div ng-if="!isParent" class="bottom-nav-items">
            <a href="#!/child" class="nav-item" ng-class="{active: isActive('/child')}">
                <span class="nav-icon"><i class="fa-solid fa-house"></i></span>
                <span class="nav-label">Home</span>
            </a>
            <a href="#!/child/chat" class="nav-item" ng-class="{active: isActive('/child/chat')}">
                <span class="nav-icon"><i class="fa-solid fa-comment"></i></span>
                <span class="nav-label">Professor</span>
            </a>
            <a href="" class="nav-item" ng-click="showProfile()">
                <span class="nav-icon"><i class="fa-solid fa-user"></i></span>
                <span class="nav-label">Perfil</span>
            </a>
        </div>
    </nav>
    
    <!-- Version Footer -->
    <div class="app-version">v{{CONFIG.VERSION}}</div>

    <!-- App (must load first — defines angular module) -->
    <script src="app.js?v=0.21.2"></script>
    
    <!-- Services -->
    <script src="services/auth.js?v=0.21.2"></script>
    <script src="services/api.js?v=0.21.2"></script>
    
    <!-- Pages -->
    <script src="pages/landing/landing.js?v=0.21.2"></script>
    <script src="pages/login/login.js?v=0.21.2"></script>
    <script src="pages/signup/signup.js?v=0.21.2"></script>
    <script src="pages/dashboard-parent/dashboard-parent.js?v=0.21.2"></script>
    <script src="pages/add-child/add-child.js?v=0.21.2"></script>
    <script src="pages/edit-child/edit-child.js?v=0.21.2"></script>
    <script src="pages/dashboard-child/dashboard-child.js?v=0.21.2"></script>
    <script src="pages/trail/trail.js?v=0.21.2"></script>
    <script src="pages/capture/capture.js?v=0.21.2"></script>
    <script src="pages/quiz/quiz.js?v=0.21.2"></script>
    <script src="pages/chat/chat.js?v=0.21.2"></script>
    <script src="pages/exams/exams.js?v=0.21.2"></script>
</body>
</html>
