<!DOCTYPE html>
<html lang="pt-BR" ng-app="tutorApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6C5CE7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tutor — Seu professor particular com IA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="img/favicon.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- AngularJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.2/angular.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular-route/1.8.2/angular-route.min.js"></script>
    
    <!-- Config -->
    <script src="config.js"></script>
</head>
<body ng-class="{'logged-in': isLoggedIn}">

    <!-- App View -->
    <div ng-view class="view-container"></div>
    
    <!-- Version Footer -->
    <div class="app-version">v{{CONFIG.VERSION}}</div>

    <!-- App (must load first — defines angular module) -->
    <script src="app.js"></script>
    
    <!-- Services -->
    <script src="services/auth.js"></script>
    <script src="services/api.js"></script>
    
    <!-- Pages -->
    <script src="pages/landing/landing.js"></script>
    <script src="pages/login/login.js"></script>
    <script src="pages/signup/signup.js"></script>
    <script src="pages/dashboard-parent/dashboard-parent.js"></script>
    <script src="pages/add-child/add-child.js"></script>
    <script src="pages/trail/trail.js"></script>
    <script src="pages/capture/capture.js"></script>
    <script src="pages/quiz/quiz.js"></script>
</body>
</html>
